<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Paycheck Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0f11;
    --surface: #16181c;
    --surface2: #1e2025;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0f0ee;
    --muted: #7a7c82;
    --accent: #c8f04a;
    --accent-dim: rgba(200,240,74,0.12);
    --accent-text: #8aab1e;
    --ot: #f0a04a;
    --ot-dim: rgba(240,160,74,0.12);
    --red: #f06060;
    --red-dim: rgba(240,96,96,0.1);
    --green: #4af0a0;
    --green-dim: rgba(74,240,160,0.1);
    --radius: 10px;
    --radius-sm: 6px;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  .container {
    max-width: 760px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 2.5rem;
    display: flex;
    align-items: baseline;
    gap: 16px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 1.25rem;
  }

  header h1 {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: -0.02em;
  }

  header span {
    font-size: 13px;
    color: var(--muted);
  }

  .settings {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 2rem;
  }

  .field {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
  }

  .field label {
    display: block;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
    font-family: var(--mono);
  }

  .field input {
    background: none;
    border: none;
    outline: none;
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
    width: 100%;
  }

  .weeks { display: flex; flex-direction: column; gap: 12px; }

  .week {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .week:hover { border-color: var(--border2); }

  .week-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  .week-name {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    background: none;
    border: none;
    outline: none;
    cursor: text;
  }

  .week-name:focus { color: var(--text); }

  .week-badge {
    font-family: var(--mono);
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 99px;
    background: var(--surface);
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .week-badge.ot {
    background: var(--ot-dim);
    color: var(--ot);
    border-color: rgba(240,160,74,0.2);
  }

  .col-headers {
    display: grid;
    grid-template-columns: 1fr 90px 90px 70px;
    gap: 8px;
    padding: 7px 14px;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-family: var(--mono);
    border-bottom: 1px solid var(--border);
  }

  .day-row {
    display: grid;
    grid-template-columns: 1fr 90px 90px 70px;
    gap: 8px;
    align-items: center;
    padding: 7px 14px;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  .day-row:hover { background: var(--surface2); }
  .day-row:last-of-type { border-bottom: none; }

  .day-row input[type="text"] {
    background: none;
    border: none;
    outline: none;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--muted);
    width: 100%;
  }

  .day-row input[type="text"]:focus { color: var(--text); }

  .day-row input[type="time"] {
    background: none;
    border: none;
    outline: none;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text);
    width: 100%;
    color-scheme: dark;
  }

  .hours-cell {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent-text);
    text-align: right;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 8px;
  }

  .remove-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s;
    padding: 0;
  }

  .day-row:hover .remove-btn { opacity: 1; }
  .remove-btn:hover { color: var(--red); }

  .week-footer {
    padding: 8px 14px;
    border-top: 1px solid var(--border);
  }

  .add-day-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.03em;
    transition: color 0.15s;
    padding: 2px 0;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .add-day-btn:hover { color: var(--accent); }

  .actions {
    display: flex;
    gap: 10px;
    margin-top: 12px;
    margin-bottom: 2rem;
  }

  .add-week-btn {
    background: none;
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--muted);
    cursor: pointer;
    font-family: var(--mono);
    font-size: 12px;
    padding: 8px 16px;
    transition: all 0.15s;
    letter-spacing: 0.03em;
  }

  .add-week-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
  }

  .results {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .results-header {
    padding: 10px 16px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .result-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 11px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }

  .result-row:last-child { border-bottom: none; }

  .result-label { color: var(--muted); }

  .result-value {
    font-family: var(--mono);
    font-weight: 500;
    color: var(--text);
  }

  .result-value.ot { color: var(--ot); }
  .result-value.deduct { color: var(--red); }
  .result-value.net { color: var(--green); }

  .result-row.total {
    background: var(--surface2);
    font-size: 16px;
  }

  .result-row.total .result-label { color: var(--text); font-weight: 500; }

  @media (max-width: 500px) {
    .settings { grid-template-columns: 1fr 1fr; }
    .col-headers, .day-row { grid-template-columns: 1fr 80px 80px 55px; }
    .day-row input[type="time"] { font-size: 12px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>paycheck.calc</h1>
    <span>biweekly · overtime per week · 1.5x above 40h</span>
  </header>

  <div class="settings">
    <div class="field">
      <label>Hourly rate</label>
      <input type="number" id="rate" value="14.42" step="0.01" min="0" />
    </div>
    <div class="field">
      <label>Break (min)</label>
      <input type="number" id="break" value="30" step="5" min="0" />
    </div>
    <div class="field">
      <label>Withholding %</label>
      <input type="number" id="tax" value="6" step="0.5" min="0" />
    </div>
  </div>

  <div class="weeks" id="weeks-container"></div>

  <div class="actions">
    <button class="add-week-btn" onclick="addWeek()">+ add week</button>
  </div>

  <div class="results">
    <div class="results-header">summary</div>
    <div id="results"></div>
  </div>
</div>

<script>
let weeks = [
  { label: "week 1", days: [
    { date: "Mon 06/02", in: "07:00", out: "16:00" },
    { date: "Tue 06/03", in: "07:00", out: "16:00" },
    { date: "Wed 06/04", in: "07:00", out: "16:00" },
    { date: "Fri 06/06", in: "07:00", out: "16:00" },
  ]},
  { label: "week 2", days: [
    { date: "Sat 06/07", in: "07:00", out: "15:30" },
    { date: "Sun 06/08", in: "07:00", out: "15:30" },
    { date: "Mon 06/09", in: "07:00", out: "15:30" },
    { date: "Tue 06/10", in: "07:00", out: "15:30" },
  ]},
  { label: "week 3", days: [
    { date: "Tue 06/16", in: "07:00", out: "15:30" },
    { date: "Wed 06/17", in: "07:00", out: "15:30" },
  ]},
];

function timeToHours(t) {
  const [h, m] = t.split(":").map(Number);
  return h + m / 60;
}

function getDayHours(d) {
  const breakH = (parseFloat(document.getElementById("break").value) || 30) / 60;
  return Math.max(0, timeToHours(d.out) - timeToHours(d.in) - breakH);
}

function getWeekHours(days) {
  return days.reduce((s, d) => s + getDayHours(d), 0);
}

function render() {
  const container = document.getElementById("weeks-container");
  container.innerHTML = "";

  weeks.forEach((week, wi) => {
    const wh = getWeekHours(week.days);
    const ot = Math.max(0, wh - 40);
    const badgeClass = ot > 0 ? "week-badge ot" : "week-badge";
    const badgeText = ot > 0 ? `${wh.toFixed(2)}h · ${ot.toFixed(2)}h OT` : `${wh.toFixed(2)}h`;

    const div = document.createElement("div");
    div.className = "week";
    div.innerHTML = `
      <div class="week-header">
        <input class="week-name" type="text" value="${week.label}" onchange="weeks[${wi}].label=this.value" />
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="${badgeClass}">${badgeText}</span>
          <button onclick="removeWeek(${wi})" title="remove week" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:0;line-height:1;transition:color 0.15s;" onmouseover="this.style.color='var(--red)'" onmouseout="this.style.color='var(--muted)'">✕</button>
        </div>
      </div>
      <div class="col-headers"><span>date</span><span>in</span><span>out</span><span>hours</span></div>
      ${week.days.map((d, di) => `
        <div class="day-row">
          <input type="text" value="${d.date}" onchange="weeks[${wi}].days[${di}].date=this.value;render()" />
          <input type="time" value="${d.in}" onchange="weeks[${wi}].days[${di}].in=this.value;render()" />
          <input type="time" value="${d.out}" onchange="weeks[${wi}].days[${di}].out=this.value;render()" />
          <div class="hours-cell">
            ${getDayHours(d).toFixed(2)}h
            <button class="remove-btn" onclick="weeks[${wi}].days.splice(${di},1);render()" title="remove">✕</button>
          </div>
        </div>
      `).join("")}
      <div class="week-footer">
        <button class="add-day-btn" onclick="addDay(${wi})">+ add day</button>
      </div>
    `;
    container.appendChild(div);
  });

  calcResults();
}

function removeWeek(wi) {
  if (weeks.length === 1) return;
  weeks.splice(wi, 1);
  render();
}

function addDay(wi) {
  weeks[wi].days.push({ date: "New day", in: "07:00", out: "15:30" });
  render();
}

function addWeek() {
  weeks.push({ label: `week ${weeks.length + 1}`, days: [{ date: "New day", in: "07:00", out: "15:30" }] });
  render();
}

function calcResults() {
  const rate = parseFloat(document.getElementById("rate").value) || 14.42;
  const taxPct = parseFloat(document.getElementById("tax").value) || 6;
  const otRate = rate * 1.5;

  let totalReg = 0, totalOT = 0;
  weeks.forEach(week => {
    const wh = getWeekHours(week.days);
    totalReg += Math.min(wh, 40);
    totalOT += Math.max(0, wh - 40);
  });

  const grossReg = totalReg * rate;
  const grossOT = totalOT * otRate;
  const gross = grossReg + grossOT;
  const withholding = gross * (taxPct / 100);
  const net = gross - withholding;

  document.getElementById("results").innerHTML = `
    <div class="result-row">
      <span class="result-label">regular (${totalReg.toFixed(2)}h × $${rate.toFixed(2)})</span>
      <span class="result-value">$${grossReg.toFixed(2)}</span>
    </div>
    ${totalOT > 0 ? `<div class="result-row">
      <span class="result-label">overtime (${totalOT.toFixed(2)}h × $${otRate.toFixed(2)})</span>
      <span class="result-value ot">$${grossOT.toFixed(2)}</span>
    </div>` : ""}
    <div class="result-row">
      <span class="result-label">gross earnings</span>
      <span class="result-value">$${gross.toFixed(2)}</span>
    </div>
    <div class="result-row">
      <span class="result-label">withholding (${taxPct}%)</span>
      <span class="result-value deduct">−$${withholding.toFixed(2)}</span>
    </div>
    <div class="result-row total">
      <span class="result-label">net pay</span>
      <span class="result-value net">$${net.toFixed(2)}</span>
    </div>
  `;
}

document.getElementById("rate").addEventListener("input", render);
document.getElementById("break").addEventListener("input", render);
document.getElementById("tax").addEventListener("input", render);

render();
</script>
</body>
</html>
